<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="AgentFS">
  <defs>
    <linearGradient id="fs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- white card -->
  <rect x="8" y="8" width="240" height="240" rx="58" fill="#ffffff"/>
  <rect x="9" y="9" width="238" height="238" rx="57" fill="none" stroke="#E5E7EB" stroke-width="2"/>

  <!-- wordmark -->
  <text x="128" y="146" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="52" letter-spacing="-0.5">
    <tspan fill="#1E1B4B">Agent</tspan><tspan fill="url(#fs)">FS</tspan>
  </text>
</svg>
